# Default config — nginx-lite grammar.
#
# Exercises most of the parsed model. Note (Phase 3 scope): only `listen` and the
# default server's root/index/client_max_body_size/error_page are ACTED ON yet.
# server_name, per-location settings, return, autoindex, cgi and upload_store are
# parsed and stored here but only take effect once the Phase 4 router lands.

# Primary virtual host on an unprivileged port.
server {
    listen 0.0.0.0:80;
    server_name localhost servant.local;

    root ./www;
    index index.html;
    client_max_body_size 1m;            # size suffixes k/m/g are supported

    error_page 404 /errors/404.html;

    location / {
        methods GET DELETE;
        autoindex off;
    }

    location /uploads {
        methods GET POST DELETE;
        root ./www;
        autoindex on;
        upload_store ./www/uploads;  # per-location override
        client_max_body_size 10m;   # per-location override
    }

    location /old {
        return 301 /;                   # redirect (acted on in Phase 4)
    }

    location /cgi-bin {
        methods GET POST;
        cgi .py /usr/bin/python3;       # CGI binding (executed in a later phase)
    }
}

