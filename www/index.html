<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>servant</title>
	<link rel="stylesheet" href="/style.css">
</head>
<body>
	<h1><span class="online"></span>Serving...</h1>
	<pre id="art">loading…</pre>
	<p>web by <code id="text">servant</code></p>
	<!--<p>Source: <a href="https://github.com/stepskop/servant">github.com/stepskop/servant</a></p>-->
	<script>
		fetch("/uploads/ascii-art.txt")
			.then(function (r) { return r.text(); })
			.then(function (t) { document.getElementById("art").textContent = t; })
			.catch(function () { document.getElementById("art").textContent = ":("; });
	</script>
</body>
</html>
