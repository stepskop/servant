<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>servant</title>
	<style>
		body {
			font-family: system-ui, sans-serif;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			margin: 0;
			background: #141414;
			color: #b8332a;
		}
		h1 {
			font-size: 3rem;
			margin: 0 0 0.5rem;
			color: #b8332a;
			letter-spacing: 0.1em;
			text-shadow: 0 0 12px rgba(184, 51, 42, 0.5);
		}
		p { color: #8a8a8a; margin: 0 0 1.5rem; }
		a { color: #b8332a; text-decoration: none; }
		a:hover { color: #d4af37; }
		code { background: #1f1f1f; color: #d4af37; padding: 2px 6px; border-radius: 4px; }
		pre {
			font-family: ui-monospace, monospace;
			font-size: 0.5rem;
			line-height: 1;
			color: #d4af37;
			margin: 0 0 1.5rem;
			filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.3));
		}
	</style>
</head>
<body>
	<h1>Greetings!</h1>
	<p>from <code id="text">servant</code></p>
	<pre id="art">loading…</pre>
	<!--<p>Source: <a href="https://github.com/stepskop/servant">github.com/stepskop/servant</a></p>-->
	<script>
		fetch("/ascii-art.txt")
			.then(function (r) { return r.text(); })
			.then(function (t) { document.getElementById("art").textContent = t; })
			.catch(function () { document.getElementById("art").textContent = ":("; });
	</script>
</body>
</html>
